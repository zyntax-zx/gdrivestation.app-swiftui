name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Diagnostic - Xcode version
        run: xcodebuild -version

      - name: Checkout
        uses: actions/checkout@v4

      - name: List schemes
        run: xcodebuild -project GDriveStation.xcodeproj -list

      - name: Archive
        run: |
          xcodebuild \
            -project GDriveStation.xcodeproj \
            -scheme GDriveStation \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$PWD/build/GDriveStation.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            clean archive 2>&1 | tail -100

      - name: Debug archive contents
        run: |
          echo "=== Archive structure ==="
          find build/GDriveStation.xcarchive -maxdepth 4 -type d || echo "Archive not found"
          echo ""
          echo "=== Looking for .app ==="
          find build/GDriveStation.xcarchive -name "*.app" -type d || echo "No .app found"

      - name: Export IPA
        run: |
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>stripSwiftSymbols</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath "$PWD/build/GDriveStation.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$PWD/build/export" 2>&1 | tail -50

          echo ""
          echo "=== Exported files ==="
          find build/export -type f || echo "No files exported"

      - name: Create IPA
        run: |
          APP_PATH=$(find build/export -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in export directory"
            exit 1
          fi
          echo "Found app: $APP_PATH"

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r GDriveStation-unsigned.ipa Payload
          rm -rf Payload ExportOptions.plist
          echo ""
          echo "IPA size:"
          ls -lh GDriveStation-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GDriveStation-unsigned-ipa
          path: GDriveStation-unsigned.ipa
          retention-days: 7
