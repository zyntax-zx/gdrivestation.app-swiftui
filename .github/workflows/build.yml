name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Diagnostic - Xcode version
        run: xcodebuild -version

      - name: Checkout
        uses: actions/checkout@v4

      - name: List schemes
        run: xcodebuild -project GDriveStation.xcodeproj -list

      - name: Archive
        run: |
          xcodebuild \
            -project GDriveStation.xcodeproj \
            -scheme GDriveStation \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$PWD/build/GDriveStation.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            clean archive

      - name: Find and create IPA
        run: |
          echo "=== Archive contents ==="
          find build/GDriveStation.xcarchive -name "*.app" -type d
          echo ""

          APP_PATH=$(find build/GDriveStation.xcarchive -name "*.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in archive"
            echo "=== Full archive tree ==="
            find build/GDriveStation.xcarchive -maxdepth 5
            exit 1
          fi

          echo "Found: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r GDriveStation-unsigned.ipa Payload
          rm -rf Payload
          echo ""
          echo "IPA created:"
          ls -lh GDriveStation-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GDriveStation-unsigned-ipa
          path: GDriveStation-unsigned.ipa
          retention-days: 7
