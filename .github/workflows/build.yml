name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Diagnostic - Xcode version
        run: xcodebuild -version

      - name: Checkout
        uses: actions/checkout@v4

      - name: List schemes
        working-directory: .
        run: xcodebuild -project GDriveStation.xcodeproj -list

      - name: Build unsigned app
        working-directory: .
        run: |
          xcodebuild \
            -project GDriveStation.xcodeproj \
            -scheme GDriveStation \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$PWD/build/GDriveStation.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            clean archive 2>&1 | tail -100

      - name: Verify .app
        working-directory: .
        run: |
          APP_PATH="build/GDriveStation.xcarchive/Products/Applications/GDriveStation.app"
          echo "Contents of .app:"
          ls -la "$APP_PATH/" || echo "APP NOT FOUND"
          echo ""
          echo "Binary size:"
          ls -lh "$APP_PATH/GDriveStation" 2>/dev/null || echo "BINARY NOT FOUND"
          echo ""
          echo "Info.plist:"
          plutil -p "$APP_PATH/Info.plist" 2>/dev/null || echo "Info.plist NOT FOUND"

      - name: Create unsigned IPA
        working-directory: .
        run: |
          mkdir -p Payload
          cp -r build/GDriveStation.xcarchive/Products/Applications/GDriveStation.app Payload/
          zip -r GDriveStation-unsigned.ipa Payload
          rm -rf Payload
          echo "IPA size:"
          ls -lh GDriveStation-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GDriveStation-unsigned-ipa
          path: GDriveStation-unsigned.ipa
          retention-days: 7
